spring.application.name=vitalog-back

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method

# PostgreSQL — usa variáveis de ambiente em produção, fallback para local
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vital_log}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:903856Lu%}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=86400000

# CORS — inclui origens locais e produção (Vercel)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# Server
server.port=${PORT:8080}
